<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Fly Adventure</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --azul-oscuro: #005f6b; --amarillo: #f7b82a; --verde: #4d8d4d; --blanco: #f4f4f4; --gris: #8a8a8a; }
        body { background-color: var(--blanco); font-family: 'Poppins', sans-serif; color: #333; }
        h1, h2, h3, .navbar-brand { font-family: 'Montserrat', sans-serif; font-weight: 700; color: var(--azul-oscuro); }
        .navbar { background-color: var(--azul-oscuro) !important; }
        .navbar-brand, .nav-link { color: var(--blanco) !important; }
        .nav-link:hover, .nav-link.active { color: var(--amarillo) !important; }
        .text-accent { color: var(--amarillo); }
        
        .card-custom { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); background-color: #fff; }
        .btn-custom { background-color: var(--verde); color: white; font-weight: 600; border: none; padding: 10px 20px; transition: 0.3s; font-family: 'Montserrat', sans-serif; }
        .btn-custom:hover { background-color: #3b6b3b; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .form-label { color: var(--azul-oscuro); font-weight: 500; }
        .form-control { border: 1px solid var(--gris); }
        .form-control:focus { border-color: var(--verde); box-shadow: 0 0 5px rgba(77, 141, 77, 0.4); }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fs-4" href="#">Fly<span class="text-accent">Adventure</span></a>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="servicios.html">Servicios</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contacto.html">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container flex-grow-1 d-flex flex-column justify-content-center align-items-center py-5">
        <div class="text-center mb-4">
            <h2 class="display-6">¿Tienes dudas? ¡Escríbenos!</h2>
            <p style="color: var(--gris);">El equipo de <strong>DragonFly</strong> está listo para responder tus preguntas sobre vuelos o la plataforma Fly Adventure.</p>
        </div>

        <div class="card card-custom p-4 p-md-5 w-100" style="max-width: 650px;">
            <form action="/api/contacto" method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="nombre" class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="nombre" required placeholder="Tu nombre">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="email" class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control" id="email" required placeholder="correo@ejemplo.com">
                    </div>
                </div>
                <div class="mb-4 mt-2">
                    <label for="mensaje" class="form-label">Pregunta o Comentario</label>
                    <textarea class="form-control" id="mensaje" rows="5" required placeholder="Escribe aquí tu consulta..."></textarea>
                </div>
                <button type="submit" class="btn btn-custom w-100 rounded-pill fs-5">Enviar Mensaje</button>
            </form>
        </div>
    </main>

</body>
</html>
