<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Fly Adventure</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --azul-oscuro: #005f6b;
            --amarillo: #f7b82a;
            --verde: #4d8d4d;
            --blanco: #f4f4f4;
            --gris: #8a8a8a;
        }
        body { background-color: var(--blanco); font-family: 'Poppins', sans-serif; color: #333; }
        h1, h2, h3, .navbar-brand { font-family: 'Montserrat', sans-serif; font-weight: 700; color: var(--azul-oscuro); }
        .navbar { background-color: var(--azul-oscuro) !important; }
        .navbar-brand, .nav-link { color: var(--blanco) !important; }
        .nav-link:hover { color: var(--amarillo) !important; }
        
        .text-accent { color: var(--amarillo); }
        .btn-custom { background-color: var(--amarillo); color: var(--azul-oscuro); font-weight: 600; border: none; padding: 10px 20px; transition: 0.3s; font-family: 'Montserrat', sans-serif; }
        .btn-custom:hover { background-color: #e5a720; color: var(--azul-oscuro); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .form-label { color: var(--azul-oscuro); font-weight: 500; }
        .form-control { border: 1px solid var(--gris); font-family: 'Poppins', sans-serif; }
        .form-control:focus { border-color: var(--verde); box-shadow: 0 0 5px rgba(77, 141, 77, 0.4); }
        
        .login-image {
            background: url('https://images.unsplash.com/photo-1521510895915-16986c547626?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80') center/cover;
            min-height: 100%;
            border-radius: 15px 0 0 15px;
        }
        .card-custom { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); background-color: #fff; overflow: hidden;}
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fs-4" href="#">Fly<span class="text-accent">Adventure</span></a>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item"><a class="nav-link" href="servicios.html">Servicios</a></li>
                    <li class="nav-item ms-lg-3"><a class="btn btn-custom btn-sm rounded-pill" href="registro.html">Registrarse</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container flex-grow-1 d-flex justify-content-center align-items-center py-5">
        <div class="card card-custom w-100" style="max-width: 900px;">
            <div class="row g-0 h-100">
                <div class="col-md-5 d-none d-md-block login-image"></div>
                <div class="col-md-7 p-5 d-flex flex-column justify-content-center">
                    <h2 class="mb-2">Inicio de sesión</h2>
                    <p class="mb-4" style="color: var(--gris); font-size: 0.9rem;">Plataforma de gestión de vuelos para <strong>DragonFly</strong>.</p>
                    <form action="/api/login" method="POST">
                        <div class="mb-3">
                            <label for="email" class="form-label">Correo Electrónico</label>
                            <input type="email" class="form-control" id="email" required placeholder="usuario@correo.com">
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="password" required>
                        </div>
                        <button type="submit" class="btn btn-custom w-100 rounded-pill">Ingresar</button>
                    </form>
                    <div class="text-center mt-4">
                        <small style="color: var(--gris);">¿No tienes cuenta? <a href="registro.html" style="color: var(--verde); font-weight: 500; text-decoration: none;">Regístrate aquí</a></small>
                    </div>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
