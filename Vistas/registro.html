<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Fly Adventure</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --azul-oscuro: #005f6b; --amarillo: #f7b82a; --verde: #4d8d4d; --blanco: #f4f4f4; --gris: #8a8a8a; }
        body { background-color: var(--blanco); font-family: 'Poppins', sans-serif; color: #333; }
        h1, h2, h3, .navbar-brand { font-family: 'Montserrat', sans-serif; font-weight: 700; color: var(--azul-oscuro); }
        .navbar { background-color: var(--azul-oscuro) !important; }
        .navbar-brand, .nav-link { color: var(--blanco) !important; }
        .nav-link:hover { color: var(--amarillo) !important; }
        
        .text-accent { color: var(--amarillo); }
        .btn-custom { background-color: var(--amarillo); color: var(--azul-oscuro); font-weight: 600; border: none; padding: 10px 20px; transition: 0.3s; font-family: 'Montserrat', sans-serif; }
        .btn-custom:hover { background-color: #e5a720; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .form-label { color: var(--azul-oscuro); font-weight: 500; }
        .form-control { border: 1px solid var(--gris); }
        .form-control:focus { border-color: var(--verde); box-shadow: 0 0 5px rgba(77, 141, 77, 0.4); }
        
        .card-custom { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); background-color: #fff; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fs-4" href="#">Fly<span class="text-accent">Adventure</span></a>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="servicios.html">Servicios</a></li>
                    <li class="nav-item"><a class="nav-link" href="iniciosesion.html">Iniciar Sesión</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container flex-grow-1 d-flex justify-content-center align-items-center py-5">
        <div class="card card-custom p-5 w-100" style="max-width: 500px;">
            <h2 class="text-center mb-2">Únete a Fly Adventure</h2>
            <p class="text-center mb-4" style="color: var(--gris); font-size: 0.9rem;">Crea tu cuenta para gestionar tus reservas con <strong>DragonFly</strong>.</p>
            <form action="/api/registro" method="POST">
                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre Completo</label>
                    <input type="text" class="form-control" id="nombre" required placeholder="Ej. Jose">
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Correo Electrónico</label>
                    <input type="email" class="form-control" id="email" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                <button type="submit" class="btn btn-custom w-100 rounded-pill">Crear Cuenta</button>
            </form>
            <div class="text-center mt-4">
                <small style="color: var(--gris);">¿Ya tienes cuenta? <a href="iniciosesion.html" style="color: var(--verde); font-weight: 500; text-decoration: none;">Inicia sesión</a></small>
            </div>
        </div>
    </main>

</body>
</html>
